site_name: INFTY
site_description: Optimization-centric toolkit for Continual AI
site_url: https://wannaa.github.io/INFTY_demo/
repo_url: https://github.com/WanNaa/INFTY_demo
repo_name: WanNaa/INFTY_demo
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/images/logo_mark.svg
  custom_dir: docs/overrides
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

extra_css:
  - assets/stylesheets/brand.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - User Guide: user_guide.md
  - API Reference: api_reference.md
  - Examples: examples.md
  - Developer Guide: developer_guide.md
  - Architecture: architecture.md
  - Troubleshooting: troubleshooting.md
  - Citation: citation.md
  - Roadmap: roadmap.md
  - Changelog: changelog.md
